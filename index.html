    <!-- ✅ LOADER CSS -->
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        margin: 0;
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      h1, h2, h3, h4, h5, h6 {
        font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      }
      body.loading { overflow: hidden; }

      #app-loader {
        position: fixed;
        inset: 0;
        background: linear-gradient(135deg, #14b8a6 0%, #06b6d4 100%);
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1), visibility 0.6s cubic-bezier(0.4, 0, 0.2, 1);
      }
      #app-loader.loaded { opacity: 0; visibility: hidden; }

      .loader-container { text-align: center; animation: fadeInUp 0.8s ease-out; }
      .loader-logo {
        font-size: 64px;
        font-weight: 900;
        color: white;
        margin-bottom: 32px;
        letter-spacing: 4px;
        animation: logoFloat 2.5s ease-in-out infinite;
        text-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
        font-family: system-ui, -apple-system, sans-serif;
      }
      .loader-spinner { width: 80px; height: 80px; margin: 0 auto; position: relative; }
      .loader-spinner::before {
        content: "";
        position: absolute;
        inset: 0;
        border: 6px solid rgba(255, 255, 255, 0.2);
        border-top-color: white;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      .loader-spinner::after {
        content: "";
        position: absolute;
        inset: 12px;
        border: 4px solid rgba(255, 255, 255, 0.3);
        border-radius: 50%;
        animation: spinReverse 1.5s linear infinite;
      }
      .loader-tagline {
        margin-top: 24px;
        color: rgba(255, 255, 255, 0.9);
        font-size: 16px;
        font-weight: 600;
        font-family: system-ui, -apple-system, sans-serif;
        letter-spacing: 1px;
        animation: pulse 2s ease-in-out infinite;
      }

      @keyframes logoFloat { 0%,100% { transform: translateY(0) scale(1);} 50% { transform: translateY(-10px) scale(1.02);} }
      @keyframes spin { to { transform: rotate(360deg);} }
      @keyframes spinReverse { to { transform: rotate(-360deg);} }
      @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px);} to { opacity: 1; transform: translateY(0);} }
      @keyframes pulse { 0%,100% { opacity: 1;} 50% { opacity: 0.7;} }

      @media (max-width: 768px) {
        .loader-logo { font-size: 48px; letter-spacing: 2px; }
        .loader-spinner { width: 64px; height: 64px; }
        .loader-tagline { font-size: 14px; }
      }
    </style>

    <script>
      function hideLoader() {
        const loader = document.getElementById("app-loader");
        if (loader && !loader.classList.contains("loaded")) {
          loader.classList.add("loaded");
          document.body.classList.remove("loading");
        }
      }
      window.addEventListener("load", function () {
        setTimeout(hideLoader, 400);
      });
      setTimeout(hideLoader, 3000);
    </script>
